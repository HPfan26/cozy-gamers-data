name: Test Switch Scraper
on:
  workflow_dispatch:
jobs:
  test-switch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: Install Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64

      - name: Run Switch scraper (Nintendo API)
        run: node scrape-switch-nintendo-api.mjs

      - name: Show results
        run: cat dekudeals_prices_all_regions.json
