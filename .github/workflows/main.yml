name: Sync JS to WordPress

on:
  push:
    branches:
      - main
    paths:
      - 'recommendation-engine-updated.js'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Upload JS to WordPress via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          local_path: './recommendation-engine-updated.js'
          remote_path: '/thecozygamers-www/wp-content/uploads/'
          sftp_only: true
          sftpArgs: '-o ConnectTimeout=10'
